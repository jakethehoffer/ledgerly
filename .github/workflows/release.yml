name: Release

# On every `v*` tag push, publishes two artifacts — each with a
# Sigstore-signed build-provenance attestation:
#   - a multi-arch (linux/amd64 + linux/arm64) Docker image to GHCR
#   - the npm package to the npm registry (via `npm publish --provenance`)
#
# `workflow_dispatch` (with a tag input) re-runs the IMAGE publish only —
# the escape hatch for re-pushing an image after a Dockerfile fix. npm
# rejects republishing an existing version, so the npm job is push-only.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)publish, e.g. v0.1.0'
        required: true

permissions:
  contents: read
  packages: write
  # Required for actions/attest-build-provenance to sign and publish a
  # SLSA-style build attestation alongside the image. `id-token: write`
  # lets the action mint an OIDC token Sigstore trusts; `attestations:
  # write` lets it store the resulting attestation on the GitHub side
  # so `gh attestation verify` can look it up.
  id-token: write
  attestations: write

# Don't let two releases race over the :latest tag.
concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

# Opt JavaScript-based actions into Node.js 24 ahead of GitHub's June 2026
# forced upgrade. See ci.yml for the rationale.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish-image:
    name: publish docker image to ghcr.io
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Resolve target ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout at tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Derive image tags
        id: tags
        run: |
          TAG="${{ steps.ref.outputs.tag }}"
          VERSION="${TAG#v}"
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LOWER}/ledgerly"
          {
            echo "image=${IMAGE}"
            echo "tag_full=${IMAGE}:${TAG}"
            echo "tag_version=${IMAGE}:${VERSION}"
            echo "tag_latest=${IMAGE}:latest"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.tags.outputs.tag_full }}
            ${{ steps.tags.outputs.tag_version }}
            ${{ steps.tags.outputs.tag_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.ref.outputs.tag }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.title=ledgerly
            org.opencontainers.image.description=Stripe-to-double-entry mapping engine for indie SaaS

      # SLSA build provenance attestation. Binds the image digest to the
      # workflow run that produced it (commit SHA, workflow file, inputs);
      # Sigstore signs the binding via the workflow's OIDC identity, no
      # long-lived signing key required. Consumers can verify with
      # `gh attestation verify oci://ghcr.io/<owner>/ledgerly:<tag>
      #   --repo ${{ github.repository }}`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          # Reuse the already-lowercased image path from the `tags` step —
          # OCI references must be lowercase but `github.repository_owner`
          # preserves the original case, which would break for mixed-case
          # usernames.
          subject-name: ${{ steps.tags.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  publish-npm:
    name: publish npm package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Tag-push only. npm rejects republishing an existing version, so a
    # workflow_dispatch re-run (which exists to rebuild an IMAGE) must not
    # attempt an npm publish — it would always fail on the already-live
    # version. The publish-image job above still runs for workflow_dispatch.
    if: github.event_name == 'push'

    steps:
      # On a tag push, the default checkout ref IS the tag, so no explicit
      # `ref:` is needed (unlike publish-image, which also serves
      # workflow_dispatch).
      - name: Checkout at tag
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: false

      - name: Install Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          # Writes an .npmrc that authenticates against the npm registry
          # using the NODE_AUTH_TOKEN env var set on the publish step.
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `npm publish` runs the package's `prepublishOnly` gate first
      # (typecheck + lint + test + build), so a broken or stale build can't
      # ship. `--provenance` attaches a Sigstore-signed provenance
      # statement: it works because this is a public repo and the workflow
      # has `id-token: write`, and npm verifies it against package.json's
      # `repository` field (which points back at this repo).
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
