name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs for the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt JavaScript-based actions into Node.js 24 ahead of GitHub's June 2026
# forced upgrade. Silences the "Node.js 20 actions are deprecated" warnings
# that otherwise surface on every run. Affects actions like
# docker/setup-buildx-action, docker/build-push-action, etc.; if any of them
# break under Node 24, we want to know now rather than at the forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    name: typecheck + lint + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: false

      - name: Install Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (with coverage)
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          # Public repos don't need a token; codecov-action falls back to
          # GitHub OIDC. We tolerate upload failures so a Codecov outage
          # doesn't redden the CI build.
          fail_ci_if_error: false

      - name: Build
        run: pnpm build

      - name: Verify dist artifacts
        run: |
          test -f dist/index.js || (echo "dist/index.js missing after build" && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts missing after build" && exit 1)
          echo "dist artifacts OK"

  docker:
    name: docker build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ledgerly:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
