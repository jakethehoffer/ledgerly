blank_issues_enabled: false
contact_links:
  - name: Security vulnerability
    url: https://github.com/jakethehoffer/ledgerly/blob/master/SECURITY.md
    about: |
      Please do NOT open a public issue for security vulnerabilities. Read SECURITY.md
      for the private reporting channel.
  - name: How-to / accounting question
    url: https://github.com/jakethehoffer/ledgerly/discussions
    about: |
      For questions about whether a particular journal entry is correct, or how to wire
      ledgerly into your stack — start a Discussion rather than a bug report. (If
      Discussions aren't enabled on this repo, open a feature request with the
      question tagged appropriately.)
